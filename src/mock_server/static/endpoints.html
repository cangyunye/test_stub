<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mock Server — 端点管理</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #161922;
  --surface-2: #1c1f2b;
  --fg: #e2e4ea;
  --muted: #6e7185;
  --border: #272a37;
  --accent: #4c8bf5;
  --accent-dim: oklch(45% 0.14 250 / 0.15);
  --success: #34d399;
  --success-dim: oklch(55% 0.14 160 / 0.12);
  --warn: #fbbf24;
  --warn-dim: oklch(65% 0.14 85 / 0.12);
  --danger: #f87171;
  --danger-dim: oklch(55% 0.16 25 / 0.12);
  --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', ui-monospace, Menlo, monospace;
  --sidebar-w: 240px;
  --header-h: 56px;
  --radius: 6px;
}
[data-theme="light"] {
  --bg: #f4f5f7; --surface: #ffffff; --surface-2: #f0f1f4;
  --fg: #1a1c22; --muted: #6b7084; --border: #dfe1e6;
  --accent: #4c8bf5; --accent-dim: oklch(92% 0.04 250);
  --success: #16a34a; --success-dim: oklch(94% 0.04 150);
  --warn: #d97706; --warn-dim: oklch(94% 0.04 80);
  --danger: #dc2626; --danger-dim: oklch(94% 0.04 25);
}
:focus-visible { outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px var(--accent); border-radius: var(--radius); }
.theme-toggle { background: none; border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: var(--radius); display: grid; place-items: center; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; }
.theme-toggle:hover { background: var(--surface-2); color: var(--fg); border-color: var(--border-hover, var(--border)); }
.theme-toggle svg { width: 16px; height: 16px; }
.theme-toggle .icon-sun { display: none; }
.theme-toggle .icon-moon { display: block; }
[data-theme="light"] .theme-toggle .icon-sun { display: block; }
[data-theme="light"] .theme-toggle .icon-moon { display: none; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: var(--font-body); background: var(--bg); color: var(--fg); line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

.sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 100; }
.sidebar-brand { height: var(--header-h); display: flex; align-items: center; gap: 10px; padding: 0 20px; border-bottom: 1px solid var(--border); font-family: var(--font-display); font-weight: 600; font-size: 15px; letter-spacing: -0.01em; color: var(--fg); }
.sidebar-nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
.nav-section { margin-bottom: 20px; }
.nav-section-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding: 0 12px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius); color: var(--muted); font-size: 13px; font-weight: 450; transition: background 0.12s, color 0.12s; cursor: pointer; text-decoration: none; }
.nav-item:hover { background: var(--surface-2); color: var(--fg); text-decoration: none; }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item svg { flex-shrink: 0; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }
.avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-dim); color: var(--accent); display: grid; place-items: center; font-size: 11px; font-weight: 600; }

.main { margin-left: var(--sidebar-w); min-height: 100vh; }
.page-header { height: var(--header-h); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 50; }
.page-header h1 { font-family: var(--font-display); font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.page-body { padding: 24px 28px; }

.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
.tab { padding: 10px 18px; font-size: 13px; font-weight: 450; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.12s, border-color 0.12s; background: none; border-top: none; border-left: none; border-right: none; font-family: var(--font-body); }
.tab:hover { color: var(--fg); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab .count { font-family: var(--font-mono); font-size: 11px; background: var(--surface-2); padding: 1px 6px; border-radius: 999px; margin-left: 6px; }

.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.search-box { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0 12px; flex: 1; max-width: 320px; }
.search-box svg { flex-shrink: 0; color: var(--muted); }
.search-box input { background: none; border: none; color: var(--fg); font-size: 13px; font-family: var(--font-body); padding: 8px 0; outline: none; width: 100%; }
.search-box input::placeholder { color: var(--muted); opacity: 0.6; }

.filter-group { display: flex; gap: 4px; }
.filter-chip { padding: 5px 10px; font-size: 11px; font-weight: 500; font-family: var(--font-mono); letter-spacing: 0.03em; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all 0.12s; }
.filter-chip:hover { border-color: var(--muted); color: var(--fg); }
.filter-chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius); font-size: 12px; font-weight: 500; letter-spacing: 0.01em; border: 1px solid var(--border); background: var(--surface-2); color: var(--fg); cursor: pointer; transition: background 0.12s, border-color 0.12s; font-family: var(--font-body); }
.btn:hover { background: var(--border); border-color: var(--muted); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: oklch(60% 0.18 250); }
.btn-sm { padding: 4px 10px; font-size: 11px; }
.btn-danger { color: var(--danger); }
.btn-danger:hover { background: var(--danger-dim); border-color: oklch(55% 0.16 25 / 0.3); }
.btn-icon { padding: 6px; border: none; background: none; color: var(--muted); cursor: pointer; border-radius: var(--radius); transition: background 0.12s, color 0.12s; }
.btn-icon:hover { background: var(--surface-2); color: var(--fg); }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { text-align: left; padding: 10px 16px; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); background: var(--surface-2); }
.data-table td { padding: 10px 16px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: oklch(20% 0.01 250 / 0.5); }

.method { display: inline-block; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.04em; padding: 2px 6px; border-radius: 3px; min-width: 42px; text-align: center; }
.method.get { background: oklch(55% 0.14 160 / 0.15); color: var(--success); }
.method.post { background: var(--accent-dim); color: var(--accent); }
.method.put { background: var(--warn-dim); color: var(--warn); }
.method.delete { background: var(--danger-dim); color: var(--danger); }
.method.patch { background: oklch(55% 0.12 310 / 0.15); color: oklch(70% 0.14 310); }
.method.ws { background: oklch(55% 0.12 280 / 0.15); color: oklch(70% 0.14 280); }

.path-text { font-family: var(--font-mono); font-size: 12px; }
.mono { font-family: var(--font-mono); font-size: 12px; font-variant-numeric: tabular-nums; }
.muted { color: var(--muted); }

.toggle { position: relative; width: 32px; height: 18px; cursor: pointer; }
.toggle input { display: none; }
.toggle-track { position: absolute; inset: 0; background: var(--border); border-radius: 9px; transition: background 0.2s; }
.toggle input:checked + .toggle-track { background: var(--success); }
.toggle-thumb { position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
.toggle input:checked ~ .toggle-thumb { transform: translateX(14px); }

.actions-cell { display: flex; gap: 4px; justify-content: flex-end; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: oklch(0% 0 0 / 0.6); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; width: 560px; max-height: 85vh; overflow-y: auto; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 15px; font-weight: 600; font-family: var(--font-display); letter-spacing: -0.01em; }
.modal-body { padding: 24px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 24px; border-top: 1px solid var(--border); }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: 0.02em; margin-bottom: 6px; }
.form-input, .form-select, .form-textarea { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--fg); font-size: 13px; font-family: var(--font-body); outline: none; transition: border-color 0.15s; }
.form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
.form-select { appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236e7185' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }
.form-textarea { min-height: 100px; resize: vertical; font-family: var(--font-mono); font-size: 12px; line-height: 1.6; }
.form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-hint { font-size: 11px; color: var(--muted); margin-top: 4px; }

.pagination { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 16px 0; }
.pagination .page-info { font-size: 12px; color: var(--muted); }
.pagination .page-size-select { font-size: 11px; font-family: var(--font-body); padding: 4px 8px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--fg); cursor: pointer; }
.code-snippet { margin-top: 12px; display: none; }
.code-snippet.open { display: block; }
.code-snippet .snippet-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.code-snippet .snippet-tab { padding: 6px 14px; font-size: 11px; font-weight: 500; color: var(--muted); cursor: pointer; background: none; border: none; border-bottom: 2px solid transparent; font-family: var(--font-body); }
.code-snippet .snippet-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.code-snippet pre { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; font-size: 11px; font-family: var(--font-mono); line-height: 1.6; overflow-x: auto; margin: 0; white-space: pre-wrap; word-break: break-all; }
.code-snippet .snippet-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 4px; }
.code-snippet .snippet-header .btn { font-size: 10px; padding: 3px 8px; }

.ws-panel { display: none; }
.ws-panel.active { display: block; }
.http-panel { display: none; }
.http-panel.active { display: block; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .form-row-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="16" height="16" rx="3" stroke="currentColor" stroke-width="1.5"/><path d="M6 10h8M10 6v8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Mock Server
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">概览</div>
      <a class="nav-item" href="index.html">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
        仪表盘
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Mock 服务</div>
      <a class="nav-item active" href="endpoints.html">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h12M2 12h8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        端点管理
      </a>
      <a class="nav-item" href="logs.html">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 2v12M6 5h7M6 8h5M6 11h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        请求日志
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">系统</div>
      <a class="nav-item" href="users.html">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.2"/><path d="M2.5 14c0-3 2.5-5 5.5-5s5.5 2 5.5 5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        用户与权限
      </a>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="avatar">A</div>
    <div><div style="color:var(--fg);font-weight:500;font-size:12px">admin</div><div style="font-size:11px">超级管理员</div></div>
  </div>
</aside>

<div class="main">
  <header class="page-header">
    <h1>端点管理</h1>
    <div class="header-actions">
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题" title="切换亮色/暗色主题">
        <svg class="icon-moon" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M13.5 8a5.5 5.5 0 0 1-7.5 5.12A5.5 5.5 0 1 0 8 2.5a5.5 5.5 0 0 1 5.5 5.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
        <svg class="icon-sun" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M3.4 12.6l1.4-1.4M11.2 4.8l1.4-1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        新建端点
      </button>
    </div>
  </header>

  <div class="page-body">
    <div class="tabs">
      <button class="tab active" data-tab="http" onclick="switchTab('http')">HTTP 端点<span class="count">12</span></button>
      <button class="tab" data-tab="ws" onclick="switchTab('ws')">WebSocket 通道<span class="count">3</span></button>
    </div>

    <div class="http-panel active" id="httpPanel">
      <div class="toolbar">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          <input type="text" placeholder="搜索路径…" id="searchInput" oninput="renderHttpTable()">
        </div>
        <div class="filter-group">
          <button class="filter-chip active" data-method="all" onclick="filterMethod(this)">ALL</button>
          <button class="filter-chip" data-method="get" onclick="filterMethod(this)">GET</button>
          <button class="filter-chip" data-method="post" onclick="filterMethod(this)">POST</button>
          <button class="filter-chip" data-method="put" onclick="filterMethod(this)">PUT</button>
          <button class="filter-chip" data-method="delete" onclick="filterMethod(this)">DEL</button>
        </div>
      </div>

      <div class="panel">
        <table class="data-table" id="httpTable">
          <thead>
            <tr>
              <th style="width:60px">启用</th>
              <th style="width:70px">方法</th>
              <th>路径</th>
              <th style="width:60px">状态码</th>
              <th style="width:70px">延迟</th>
              <th style="width:70px">错误率</th>
              <th style="width:100px">归属</th>
              <th style="width:90px;text-align:right">操作</th>
            </tr>
          </thead>
          <tbody id="httpTableBody">
          </tbody>
        </table>
      </div>
      <div class="pagination" id="httpPagination">
        <button class="btn btn-sm" id="httpPrevBtn" onclick="goToPage('http', -1)">&lt;</button>
        <span class="page-info" id="httpPageInfo">第 1 页 / 共 1 页</span>
        <button class="btn btn-sm" id="httpNextBtn" onclick="goToPage('http', 1)">&gt;</button>
        <select class="page-size-select" id="httpPageSize" onchange="changePageSize('http')">
          <option value="15">15 条/页</option>
          <option value="30">30 条/页</option>
          <option value="50">50 条/页</option>
          <option value="100">100 条/页</option>
        </select>
      </div>
    </div>

    <div class="ws-panel" id="wsPanel">
      <div class="toolbar">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          <input type="text" placeholder="搜索 WebSocket 路径…" id="wsSearchInput" oninput="loadEndpoints()">
        </div>
      </div>
      <div class="panel">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:60px">启用</th>
              <th>路径</th>
              <th style="width:90px">回声模式</th>
              <th style="width:100px">自动推送</th>
              <th style="width:120px">消息模板</th>
              <th style="width:90px;text-align:right">操作</th>
            </tr>
          </thead>
          <tbody id="wsTableBody">
          </tbody>
        </table>
      </div>
      <div class="pagination" id="wsPagination">
        <button class="btn btn-sm" id="wsPrevBtn" onclick="goToPage('ws', -1)">&lt;</button>
        <span class="page-info" id="wsPageInfo">第 1 页 / 共 1 页</span>
        <button class="btn btn-sm" id="wsNextBtn" onclick="goToPage('ws', 1)">&gt;</button>
        <select class="page-size-select" id="wsPageSize" onchange="changePageSize('ws')">
          <option value="15">15 条/页</option>
          <option value="30">30 条/页</option>
          <option value="50">50 条/页</option>
          <option value="100">100 条/页</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">新建 HTTP 端点</span>
      <button class="btn-icon" onclick="closeModal()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">HTTP 方法</label>
          <select class="form-select" id="formMethod">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
            <option>PATCH</option>
            <option>HEAD</option>
            <option>OPTIONS</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">响应状态码</label>
          <input class="form-input" id="formStatusCode" type="number" value="200" min="100" max="599">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">路径</label>
        <input class="form-input" id="formPath" type="text" placeholder="/api/resource/{id}" style="font-family:var(--font-mono);font-size:12px">
        <div class="form-hint">支持 {param} 风格的路径参数</div>
      </div>
      <div class="form-group">
        <label class="form-label">响应体 (支持 Jinja2 模板)</label>
        <textarea class="form-textarea" id="formBody" placeholder='{"code": 200, "data": {"id": "{{id}}"}}'></textarea>
      </div>
      <div class="form-row-2">
        <div class="form-group">
          <label class="form-label">延迟 (ms)</label>
          <input class="form-input" id="formDelay" type="number" value="0" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">错误率 (0.0 - 1.0)</label>
          <input class="form-input" id="formErrorRate" type="number" value="0" min="0" max="1" step="0.01">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">归属用户</label>
        <select class="form-select" id="formOwner">
          <option value="">公共端点</option>
        </select>
        <div class="form-hint">公共端点对所有请求者可见；私有端点仅归属用户通过 stub-x-token 访问时匹配</div>
      </div>
    </div>
    <div class="code-snippet" id="codeSnippet">
      <div class="snippet-tabs">
        <button class="snippet-tab active" data-lang="curl" onclick="switchSnippet('curl')">curl</button>
        <button class="snippet-tab" data-lang="python" onclick="switchSnippet('python')">Python</button>
      </div>
      <div class="snippet-header">
        <span style="font-size:11px;color:var(--muted)">请求示例</span>
        <button class="btn btn-sm" onclick="copySnippet()">复制</button>
      </div>
      <pre id="snippetContent"></pre>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-sm" id="btnShowSnippet" style="display:none" onclick="toggleSnippet()">复制请求</button>
      <button class="btn btn-primary" id="btnCreateEndpoint" onclick="createEndpoint()">创建端点</button>
    </div>
  </div>
</div>

<script>
var API_BASE = '/admin/api';

async function apiRequest(path, options) {
  try {
    var resp = await fetch(API_BASE + path, Object.assign({
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin'
    }, options));
    var data = await resp.json();
    if (resp.status === 401 && path !== '/auth/login') {
      location.href = 'login.html';
      return null;
    }
    return data;
  } catch (err) {
    return { code: 0, message: '网络错误: ' + err.message, data: null };
  }
}

var httpEndpoints = [];
var wsChannels = [];
var activeMethod = 'all';
var users = [];
var editingId = null;
var httpPage = 1, wsPage = 1;
var httpTotalPages = 1, wsTotalPages = 1;
var httpTotal = 0, wsTotal = 0;
var snippetLang = 'curl';
var snippetEndpoint = null;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  document.getElementById('httpPanel').classList.toggle('active', tab === 'http');
  document.getElementById('wsPanel').classList.toggle('active', tab === 'ws');
}

function filterMethod(el) {
  document.querySelectorAll('.filter-chip').forEach(function(c) { c.classList.remove('active'); });
  el.classList.add('active');
  activeMethod = el.dataset.method;
  httpPage = 1;
  loadEndpoints();
}

function renderHttpTable() {
  var q = document.getElementById('searchInput').value.toLowerCase();
  var tbody = document.getElementById('httpTableBody');
  var filtered = httpEndpoints.filter(function(ep) {
    var matchMethod = activeMethod === 'all' || ep.method.toLowerCase() === activeMethod;
    var matchPath = !q || ep.path.toLowerCase().indexOf(q) !== -1;
    return matchMethod && matchPath;
  });
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">暂无匹配的端点</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function(ep) {
    var mc = ep.method.toLowerCase();
    return '<tr>' +
      '<td><label class="toggle"><input type="checkbox"' + (ep.is_active ? ' checked' : '') + ' onchange="toggleEndpoint(' + ep.id + ')"><span class="toggle-track"></span><span class="toggle-thumb"></span></label></td>' +
      '<td><span class="method ' + mc + '">' + ep.method + '</span></td>' +
      '<td class="path-text">' + ep.path + '</td>' +
      '<td class="mono">' + ep.status_code + '</td>' +
      '<td class="mono muted">' + (ep.delay_ms > 0 ? ep.delay_ms + 'ms' : '—') + '</td>' +
      '<td class="mono muted">' + (ep.error_rate > 0 ? ep.error_rate.toFixed(2) : '—') + '</td>' +
      '<td class="muted" style="font-size:12px">' + (ep.owner_name || '公共') + '</td>' +
      '<td><div class="actions-cell">' +
        '<button class="btn-icon" title="复制请求" onclick="showSnippetFor(' + ep.id + ')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 3h8v8H3z" stroke="currentColor" stroke-width="1.2"/><path d="M5 5h4v4H5z" fill="currentColor" opacity="0.3"/></svg></button>' +
        '<button class="btn-icon" title="编辑" onclick="editEndpoint(' + ep.id + ')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M10 2l2 2-7 7H3v-2l7-7z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg></button>' +
        '<button class="btn-icon" title="删除" onclick="deleteEndpoint(' + ep.id + ')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 4h8l-.5 8H3.5L3 4zM5.5 4V3a1 1 0 011-1h1a1 1 0 011 1v1M2 4h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
      '</div></td></tr>';
  }).join('');
}

function renderWsTable() {
  var q = document.getElementById('wsSearchInput').value.toLowerCase();
  var tbody = document.getElementById('wsTableBody');
  var filtered = wsChannels.filter(function(ch) {
    return !q || ch.path.toLowerCase().indexOf(q) !== -1;
  });
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">暂无 WebSocket 通道</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(function(ch) {
    return '<tr>' +
      '<td><label class="toggle"><input type="checkbox"' + (ch.is_active ? ' checked' : '') + ' onchange="toggleWsChannel(' + ch.id + ')"><span class="toggle-track"></span><span class="toggle-thumb"></span></label></td>' +
      '<td class="path-text">' + ch.path + '</td>' +
      '<td><span class="method ws">' + (ch.echo_mode ? '回声' : '关闭') + '</span></td>' +
      '<td class="mono muted">' + (ch.auto_push_interval > 0 ? ch.auto_push_interval + 's' : '—') + '</td>' +
      '<td class="muted" style="font-size:11px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + (ch.message_template || '') + '">' + (ch.message_template ? ch.message_template.substring(0, 30) + (ch.message_template.length > 30 ? '…' : '') : '—') + '</td>' +
      '<td><div class="actions-cell">' +
        '<button class="btn-icon" title="删除" onclick="deleteWsChannel(' + ch.id + ')"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 4h8l-.5 8H3.5L3 4zM5.5 4V3a1 1 0 011-1h1a1 1 0 011 1v1M2 4h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>' +
      '</div></td></tr>';
  }).join('');
}

async function loadEndpoints() {
  var pageSize = parseInt(document.getElementById('httpPageSize').value, 10) || 15;
  var params = 'page=' + httpPage + '&page_size=' + pageSize;
  if (activeMethod !== 'all') params += '&method=' + activeMethod.toUpperCase();
  var q = document.getElementById('searchInput').value.trim();
  if (q) params += '&keyword=' + encodeURIComponent(q);
  var result = await apiRequest('/endpoints?' + params);
  if (result && result.code === 200 && result.data) {
    httpEndpoints = result.data.items || [];
    httpTotal = result.data.total || 0;
    httpTotalPages = Math.max(1, Math.ceil(httpTotal / pageSize));
    renderHttpTable();
    renderPagination('http');
    var countEl = document.querySelector('[data-tab="http"] .count');
    if (countEl) countEl.textContent = httpTotal;
  }
}

async function loadWsChannels() {
  var pageSize = parseInt(document.getElementById('wsPageSize').value, 10) || 15;
  var params = 'page=' + wsPage + '&page_size=' + pageSize;
  var q = document.getElementById('wsSearchInput').value.trim();
  if (q) params += '&keyword=' + encodeURIComponent(q);
  var result = await apiRequest('/websocket-channels?' + params);
  if (result && result.code === 200 && result.data) {
    wsChannels = result.data.items || [];
    wsTotal = result.data.total || 0;
    wsTotalPages = Math.max(1, Math.ceil(wsTotal / pageSize));
    renderWsTable();
    renderPagination('ws');
    var countEl = document.querySelector('[data-tab="ws"] .count');
    if (countEl) countEl.textContent = wsTotal;
  }
}

function resetForm() {
  document.getElementById('formMethod').value = 'GET';
  document.getElementById('formPath').value = '';
  document.getElementById('formStatusCode').value = '200';
  document.getElementById('formBody').value = '';
  document.getElementById('formDelay').value = '0';
  document.getElementById('formErrorRate').value = '0';
  document.getElementById('formOwner').value = '';
}

async function createEndpoint() {
  var btn = document.getElementById('btnCreateEndpoint');
  btn.disabled = true;
  btn.textContent = '创建中…';
  var body = {
    method: document.getElementById('formMethod').value,
    path: document.getElementById('formPath').value.trim(),
    status_code: parseInt(document.getElementById('formStatusCode').value, 10) || 200,
    response_body: document.getElementById('formBody').value,
    delay_ms: parseInt(document.getElementById('formDelay').value, 10) || 0,
    error_rate: parseFloat(document.getElementById('formErrorRate').value) || 0,
    is_active: true
  };
  var ownerVal = document.getElementById('formOwner').value;
  if (ownerVal) body.owner_id = parseInt(ownerVal, 10);
  if (!body.path) {
    alert('请输入路径');
    btn.disabled = false;
    btn.textContent = '创建端点';
    return;
  }
  var result = await apiRequest('/endpoints', {
    method: 'POST',
    body: JSON.stringify(body)
  });
  btn.disabled = false;
  btn.textContent = '创建端点';
  if (result && (result.code === 201 || result.code === 200)) {
    closeModal();
    resetForm();
    await loadEndpoints();
  } else {
    alert((result && result.message) || '创建失败');
  }
}

async function saveEndpoint(id) {
  var btn = document.getElementById('btnCreateEndpoint');
  btn.disabled = true;
  btn.textContent = '保存中…';
  var body = {
    method: document.getElementById('formMethod').value,
    path: document.getElementById('formPath').value.trim(),
    status_code: parseInt(document.getElementById('formStatusCode').value, 10) || 200,
    response_body: document.getElementById('formBody').value,
    delay_ms: parseInt(document.getElementById('formDelay').value, 10) || 0,
    error_rate: parseFloat(document.getElementById('formErrorRate').value) || 0
  };
  var ownerVal = document.getElementById('formOwner').value;
  if (ownerVal !== '') {
    body.owner_id = parseInt(ownerVal, 10);
  } else {
    body.owner_id = null;
  }
  if (!body.path) {
    alert('请输入路径');
    btn.disabled = false;
    btn.textContent = '保存';
    return;
  }
  var res = await apiRequest('/endpoints/' + id, { method: 'PUT', body: JSON.stringify(body) });
  btn.disabled = false;
  btn.textContent = '保存';
  if (res && (res.code === 200 || res.code === 201)) {
    closeModal();
    await loadEndpoints();
  } else {
    alert((res && res.message) || '更新失败');
  }
}

async function toggleEndpoint(id) {
  var result = await apiRequest('/endpoints/' + id + '/toggle', { method: 'PATCH' });
  if (result && result.code === 200) {
    var ep = httpEndpoints.find(function(e) { return e.id === id; });
    if (ep && result.data) ep.is_active = result.data.is_active;
  } else {
    await loadEndpoints();
  }
}

async function editEndpoint(id) {
  var result = await apiRequest('/endpoints/' + id);
  if (!result || result.code !== 200 || !result.data) return;
  var ep = result.data;
  editingId = id;
  snippetEndpoint = ep;
  document.getElementById('formMethod').value = ep.method;
  document.getElementById('formPath').value = ep.path;
  document.getElementById('formStatusCode').value = ep.status_code;
  document.getElementById('formBody').value = ep.response_body || '';
  document.getElementById('formDelay').value = ep.delay_ms || 0;
  document.getElementById('formErrorRate').value = ep.error_rate || 0;
  document.getElementById('formOwner').value = ep.owner_id || '';
  document.getElementById('btnCreateEndpoint').onclick = function() { saveEndpoint(id); };
  document.getElementById('btnCreateEndpoint').textContent = '保存';
  document.querySelector('.modal-title').textContent = '编辑 HTTP 端点';
  document.getElementById('btnShowSnippet').style.display = '';
  document.getElementById('btnShowSnippet').onclick = function() { toggleSnippet(); };
  document.getElementById('codeSnippet').classList.remove('open');
  document.getElementById('modal').classList.add('open');
}

async function deleteEndpoint(id) {
  if (!confirm('确定删除该端点？')) return;
  var result = await apiRequest('/endpoints/' + id, { method: 'DELETE' });
  if (result && result.code === 200) {
    await loadEndpoints();
  } else {
    alert((result && result.message) || '删除失败');
  }
}

async function loadUsers() {
  var result = await apiRequest('/users?page=1&page_size=100');
  if (result && result.code === 200 && result.data) {
    users = result.data.items || [];
    var sel = document.getElementById('formOwner');
    var currentVal = sel.value;
    sel.innerHTML = '<option value="">公共端点</option>';
    users.forEach(function(u) {
      var opt = document.createElement('option');
      opt.value = u.id;
      opt.textContent = u.display_name || u.username;
      sel.appendChild(opt);
    });
    sel.value = currentVal;
  }
}

function renderPagination(type) {
  var isHttp = type === 'http';
  var page = isHttp ? httpPage : wsPage;
  var totalPages = isHttp ? httpTotalPages : wsTotalPages;
  var total = isHttp ? httpTotal : wsTotal;
  var pageSizeEl = document.getElementById(type + 'PageSize');
  var pageSize = parseInt(pageSizeEl.value, 10) || 15;

  document.getElementById(type + 'PageInfo').textContent = '第 ' + page + ' / ' + totalPages + ' 页（共 ' + total + ' 条）';
  document.getElementById(type + 'PrevBtn').disabled = page <= 1;
  document.getElementById(type + 'NextBtn').disabled = page >= totalPages;
  pageSizeEl.value = pageSize;
}

function goToPage(type, delta) {
  if (type === 'http') {
    httpPage = Math.max(1, Math.min(httpPage + delta, httpTotalPages));
    loadEndpoints();
  } else {
    wsPage = Math.max(1, Math.min(wsPage + delta, wsTotalPages));
    loadWsChannels();
  }
}

function changePageSize(type) {
  if (type === 'http') {
    httpPage = 1;
    loadEndpoints();
  } else {
    wsPage = 1;
    loadWsChannels();
  }
}

function generateCurlSnippet(ep) {
  var lines = [];
  lines.push('curl -X ' + ep.method + " '" + location.origin + ep.path + "'");
  if (ep.owner_id) {
    var ownerName = 'admin';
    if (users && users.length) {
      var u = users.find(function(x) { return x.id === ep.owner_id; });
      if (u) ownerName = u.username;
    }
    lines.push("  -H 'stub-x-token: " + ownerName + "'");
  }
  if (ep.method === 'POST' || ep.method === 'PUT' || ep.method === 'PATCH') {
    lines.push("  -H 'Content-Type: application/json'");
    try {
      var bodyPreview = ep.response_body;
      if (bodyPreview && bodyPreview.length > 200) bodyPreview = bodyPreview.substring(0, 200) + '...';
      lines.push("  -d '" + (bodyPreview || '{}') + "'");
    } catch(e) {}
  }
  return lines.join(' \\\n');
}

function generatePythonSnippet(ep) {
  var lines = [];
  lines.push('import requests');
  lines.push('');
  lines.push('url = "' + location.origin + ep.path + '"');
  lines.push('headers = {}');
  if (ep.owner_id) {
    var ownerName = 'admin';
    if (users && users.length) {
      var u = users.find(function(x) { return x.id === ep.owner_id; });
      if (u) ownerName = u.username;
    }
    lines.push("headers['stub-x-token'] = '" + ownerName + "'");
  }
  if (ep.method === 'POST' || ep.method === 'PUT' || ep.method === 'PATCH') {
    lines.push("headers['Content-Type'] = 'application/json'");
    try {
      var bodyPreview = ep.response_body;
      if (bodyPreview && bodyPreview.length > 200) bodyPreview = bodyPreview.substring(0, 200) + '...';
      lines.push('data = ' + (bodyPreview || "{}"));
      lines.push('');
      lines.push("r = requests." + ep.method.toLowerCase() + "(url, headers=headers, json=data)");
    } catch(e) {
      lines.push('');
      lines.push("r = requests." + ep.method.toLowerCase() + "(url, headers=headers)");
    }
  } else {
    lines.push('');
    lines.push("r = requests." + ep.method.toLowerCase() + "(url, headers=headers)");
  }
  lines.push("print(r.status_code, r.text)");
  return lines.join('\n');
}

async function showSnippetFor(id) {
  var result = await apiRequest('/endpoints/' + id);
  if (!result || result.code !== 200 || !result.data) return;
  var ep = result.data;
  snippetEndpoint = ep;
  snippetLang = 'curl';
  editingId = id;
  document.getElementById('formMethod').value = ep.method;
  document.getElementById('formPath').value = ep.path;
  document.getElementById('formStatusCode').value = ep.status_code;
  document.getElementById('formBody').value = ep.response_body || '';
  document.getElementById('formDelay').value = ep.delay_ms || 0;
  document.getElementById('formErrorRate').value = ep.error_rate || 0;
  document.getElementById('formOwner').value = ep.owner_id || '';
  document.getElementById('btnCreateEndpoint').onclick = function() { saveEndpoint(id); };
  document.getElementById('btnCreateEndpoint').textContent = '保存';
  document.querySelector('.modal-title').textContent = '编辑 HTTP 端点';
  document.getElementById('btnShowSnippet').style.display = '';
  document.getElementById('btnShowSnippet').onclick = function() { toggleSnippet(); };
  document.getElementById('codeSnippet').classList.add('open');
  document.querySelector('.snippet-tab[data-lang="curl"]').classList.add('active');
  document.querySelector('.snippet-tab[data-lang="python"]').classList.remove('active');
  updateSnippetDisplay();
  document.getElementById('modal').classList.add('open');
}

function updateSnippetDisplay() {
  if (!snippetEndpoint) return;
  var code = snippetLang === 'curl' ? generateCurlSnippet(snippetEndpoint) : generatePythonSnippet(snippetEndpoint);
  document.getElementById('snippetContent').textContent = code;
}

function switchSnippet(lang) {
  snippetLang = lang;
  document.querySelectorAll('.snippet-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.lang === lang); });
  updateSnippetDisplay();
}

function toggleSnippet() {
  var el = document.getElementById('codeSnippet');
  el.classList.toggle('open');
  if (el.classList.contains('open') && snippetEndpoint) updateSnippetDisplay();
}

function copySnippet() {
  var text = document.getElementById('snippetContent').textContent;
  if (!text) return;
  var done = function() {
    var btn = document.querySelector('.snippet-header .btn');
    if (!btn) return;
    var old = btn.textContent;
    btn.textContent = '已复制';
    setTimeout(function() { btn.textContent = old; }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(function() { fallbackCopy(text, done); });
  } else {
    fallbackCopy(text, done);
  }
}

function fallbackCopy(text, done) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  ta.style.pointerEvents = 'none';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    done();
  } catch(e) {}
  document.body.removeChild(ta);
}

async function toggleWsChannel(id) {
  var result = await apiRequest('/websocket-channels/' + id + '/toggle', { method: 'PATCH' });
  if (result && result.code === 200) {
    var ch = wsChannels.find(function(c) { return c.id === id; });
    if (ch && result.data) ch.is_active = result.data.is_active;
  } else {
    await loadWsChannels();
  }
}

async function deleteWsChannel(id) {
  if (!confirm('确定删除该 WebSocket 通道？')) return;
  var result = await apiRequest('/websocket-channels/' + id, { method: 'DELETE' });
  if (result && result.code === 200) {
    await loadWsChannels();
  } else {
    alert((result && result.message) || '删除失败');
  }
}

function openModal() {
  editingId = null;
  snippetEndpoint = null;
  resetForm();
  document.getElementById('btnCreateEndpoint').onclick = createEndpoint;
  document.getElementById('btnCreateEndpoint').textContent = '创建端点';
  document.querySelector('.modal-title').textContent = '新建 HTTP 端点';
  document.getElementById('btnShowSnippet').style.display = 'none';
  document.getElementById('codeSnippet').classList.remove('open');
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('codeSnippet').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

document.getElementById('searchInput').addEventListener('input', function() { httpPage = 1; loadEndpoints(); });
document.getElementById('wsSearchInput').addEventListener('input', function() { wsPage = 1; loadWsChannels(); });

loadEndpoints();
loadWsChannels();
loadUsers();

(function() {
  var t = document.getElementById('themeToggle');
  var s = localStorage.getItem('mock-server-theme');
  if (s === 'light' || (!s && window.matchMedia('(prefers-color-scheme: light)').matches)) {
    document.documentElement.setAttribute('data-theme', 'light');
  }
  t.addEventListener('click', function() {
    var isLight = document.documentElement.getAttribute('data-theme') === 'light';
    if (isLight) { document.documentElement.removeAttribute('data-theme'); localStorage.setItem('mock-server-theme', 'dark'); }
    else { document.documentElement.setAttribute('data-theme', 'light'); localStorage.setItem('mock-server-theme', 'light'); }
  });
})();
</script>
</body>
</html>
